<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Rosenberg. IT ab Werk.</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- Grüne Seitenränder -->
  <div class="sidebar left"></div>
  <div class="sidebar right"></div>

  <!-- Weißer Glow-Kreis -->
  <div class="white-point"></div>

  <!-- Hauptbereich -->
  <main class="main-wrapper">

    <section class="content">

      <div class="image-wrapper">

        <!-- Bild -->
        <img src="rbw.png" alt="Rosenberg Logo" class="logo" />

        <!-- Text -->
        <h1 class="center-text">

          <span style="--i:0">R</span>
          <span style="--i:1">o</span>
          <span style="--i:2">s</span>
          <span style="--i:3">e</span>
          <span style="--i:4">n</span>
          <span style="--i:5">b</span>
          <span style="--i:6">e</span>
          <span style="--i:7">r</span>
          <span style="--i:8">g</span>
          <span style="--i:9">.</span>

          <span class="space"></span>

          <span style="--i:10">I</span>
          <span style="--i:11">T</span>

          <span class="space"></span>

          <span style="--i:12">a</span>
          <span style="--i:13">b</span>

          <span class="space"></span>

          <span style="--i:14">W</span>
          <span style="--i:15">e</span>
          <span style="--i:16">r</span>
          <span style="--i:17">k</span>
          <span style="--i:18">.</span>

        </h1>

      </div>

    </section>

  </main>

</body>
</html>
